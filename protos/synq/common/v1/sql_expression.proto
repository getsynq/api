syntax = "proto3";

package synq.common.v1;

option go_package = "github.com/getsynq/api/common/v1";

// SqlExpression carries a SQL string together with the placeholder tokens
// the caller must substitute before executing it.
//
// Empty `placeholders` means `sql` is byte-equal to what runs in the warehouse
// and is safe to dispatch without further processing. When `placeholders` is
// non-empty, every listed token appears literally in `sql` and must be replaced
// (or otherwise interpreted) by the caller before execution.
message SqlExpression {
  // SQL string. Dialect matches the integration that owns the expression's
  // parent resource. May contain placeholder tokens — see `placeholders`.
  string sql = 1;

  // Placeholders present in `sql`. Order is undefined; each token is unique
  // within the slice. Absent when `sql` is directly runnable.
  repeated SqlPlaceholder placeholders = 2;
}

// SqlPlaceholder describes one substitution slot in a SqlExpression.
message SqlPlaceholder {
  // Literal token as it appears in `sql`, e.g. "{from}".
  string token = 1;

  // Human- and AI-readable purpose of the placeholder. Should answer
  // "what value should I substitute, and in what form?" without relying on
  // out-of-band documentation. Example:
  // "Lower bound of the metric query time window (inclusive, UTC timestamp)."
  string description = 2;
}
