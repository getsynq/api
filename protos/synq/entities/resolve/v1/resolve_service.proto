syntax = "proto3";

package synq.entities.resolve.v1;

import "buf/validate/validate.proto";
import "google/api/annotations.proto";
import "synq/entities/v1/identifier.proto";
import "synq/v1/scope_authorization.proto";

option go_package = "github.com/getsynq/api/entities/resolve/v1";

// IdentifierResolveService resolves identifiers to their SYNQ paths and identities.
service IdentifierResolveService {
  // Resolve multiple identifiers, returning their SYNQ paths and identity groups.
  rpc BatchResolveIdentifiers(BatchResolveIdentifiersRequest) returns (BatchResolveIdentifiersResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
    option (synq.v1.scope_authorization) = {
      scopes: [
        SCOPE_ENTITY_READ,
        SCOPE_SRE_AGENT,
        SCOPE_MCP_READ
      ]
    };
    option (google.api.http) = {
      post: "/api/resolve/v1/by-id"
      body: "*"
    };
  }
}

message BatchResolveIdentifiersRequest {
  // Identifiers to resolve.
  repeated synq.entities.v1.Identifier ids = 1 [(buf.validate.field) = {
    repeated: {
      items: {required: true}
    }
  }];

  // When true, also verify that the resolved entities actually exist in the system.
  bool check_existence = 2;
}

message BatchResolveIdentifiersResponse {
  repeated ResolvedIdentifier resolved_identifiers = 1;
}

// ResolvedIdentifier contains the resolution result for a single input identifier.
message ResolvedIdentifier {
  // The original input identifier.
  synq.entities.v1.Identifier id = 1;

  // The SYNQ path for this identifier.
  string synq_path = 2;

  // All identifiers that are part of the same identity group (including the input identifier).
  repeated synq.entities.v1.Identifier identities = 3;

  // All SYNQ paths in the identity group.
  repeated string identity_synq_paths = 4;

  // Whether the entity exists in the system. Only populated when check_existence is true in the request.
  optional bool exists = 5;
}
