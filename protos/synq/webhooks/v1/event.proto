syntax = "proto3";

package synq.webhooks.v1;

import "google/protobuf/timestamp.proto";
import "synq/entities/v1/identifier.proto";
import "synq/issues/actor/v1/actor.proto";
import "synq/webhooks/v1/callback.proto";

option go_package = "github.com/getsynq/api/webhooks/v1";

// A webhook event delivered to a customer-configured endpoint.
//
// Payload signing: every outgoing request is signed so the receiver can verify
// it originated from Coalesce Quality and was not tampered with or replayed. Two
// headers are sent on every delivery:
//
//   X-Coalesce-Timestamp: <unix seconds when the delivery was signed>
//   X-Coalesce-Signature: v1=<hex-encoded HMAC-SHA256>
//
// The signature is computed as:
//
//   signed_payload = "{X-Coalesce-Timestamp}." + <raw request body bytes>
//   signature      = hex( HMAC_SHA256(key = signing_secret, msg = signed_payload) )
//
// where signing_secret is the per-integration secret shown (read-only) in the
// webhook integration settings. To verify:
//
//   1. Read X-Coalesce-Timestamp and the raw request body.
//   2. Recompute the signature with your copy of the signing secret and compare
//      it against the v1=... value in X-Coalesce-Signature using a constant-time
//      comparison.
//   3. Optionally reject deliveries whose timestamp is outside your tolerance
//      window (retries reuse the original signing timestamp, so allow for the
//      retry backoff window — up to ~30 minutes).
//
// The v1= prefix identifies the signature scheme; future schemes may add
// additional space-separated values to the header.
message Event {
  string workspace = 1;
  string event_id = 2;
  google.protobuf.Timestamp event_time = 3;

  enum EventType {
    EVENT_TYPE_UNSPECIFIED = 0;
    EVENT_TYPE_PING = 10;
    EVENT_TYPE_ISSUE_CREATED = 11;
    EVENT_TYPE_ISSUE_UPDATED = 12;
    EVENT_TYPE_ISSUE_STATUS_UPDATED = 13;
    EVENT_TYPE_ISSUE_CLOSED = 14;
    EVENT_TYPE_INCIDENT_OPEN = 20;
    EVENT_TYPE_INCIDENT_CLOSED = 21;
    EVENT_TYPE_INCIDENT_CANCELLED = 22;
  }
  EventType event_type = 4;
  oneof data {
    Ping ping = 10;
    IssueCreated issue_created = 11;
    IssueUpdated issue_updated = 12;
    IssueStatusUpdated issue_status_updated = 13;
    IssueClosed issue_closed = 14;
    IncidentOpen incident_open = 20;
    IncidentClosed incident_closed = 21;
    IncidentCancelled incident_cancelled = 22;
  }

  repeated Callback callbacks = 40;
}

// Test event sent during a webhook setup.
message Ping {
  string message = 1;
}

message IssueCreated {
  IssueSummary issue = 1;
}

message IssueUpdated {
  IssueSummary issue = 1;
}

message IssueStatusUpdated {
  IssueSummary issue = 1;
}

message IssueClosed {
  IssueSummary issue = 1;
}

message IssueSummary {
  message IssueEntity {
    string name = 1;
    string type_name = 2;
    synq.entities.v1.Identifier identifier = 3;
    optional string folder = 4;
    string entity_url = 5;
  }
  enum IssueStatus {
    ISSUE_STATUS_UNSPECIFIED = 0;
    ISSUE_STATUS_INVESTIGATING = 1;
    ISSUE_STATUS_EXPECTED = 2;
    ISSUE_STATUS_FIXED = 3;
    ISSUE_STATUS_NO_ACTION_NEEDED = 4;
    reserved 5;
  }

  string issue_id = 1;
  string issue_group_id = 2;
  string issue_url = 3;
  // Summary of the issue, what happened and where.
  string title = 4;
  // Detailed description of the issue. In the Markdown format.
  string description = 5;
  // Detailed description of the issue. In the HTML format.
  string description_html = 14;

  // Entity which triggered the issue.
  IssueEntity trigger_entity = 6;
  // Entities directly affected by the issue, not considering downstream ones.
  repeated IssueEntity directly_affected_entities = 7;

  // The primary entities being monitored that are associated with this issue,
  // for example the dbt model or dbt Cloud job that a failing test is attached to.
  repeated IssueEntity monitored_entities = 15;

  // Time when the issue was triggered.
  google.protobuf.Timestamp started_at = 8;
  // Time when the issue was closed.
  optional google.protobuf.Timestamp ended_at = 9;

  string trigger_run_id = 10;
  string trigger_name = 11;
  string trigger_message = 12;

  IssueStatus status = 13;

  // The user who set the current status, when the transition was
  // human-initiated (e.g. someone pressing Expected / Fixed / No action
  // needed / Investigating in the app or via the public API). This is the
  // same actor exposed by the Issues API as `Issue.latest_status_actor`, so
  // the two feeds can be joined on it.
  //
  // Set only when an actor is known: it is populated on `issue_status_updated`
  // events and left unset for system-driven transitions with no human actor
  // (e.g. a status implied by a monitor run). Consumers must treat it as
  // optional and tolerate its absence.
  //
  // Carries the strongest identity the caller proved — a Coalesce Quality
  // email, Slack user id, or PagerDuty user id — alongside a display `name`.
  optional synq.issues.actor.v1.Actor status_actor = 16;

  // Owners of the entities this issue is about.
  //
  // Covers only the direct owners of the affected entities, not the owners of
  // downstream entities. Empty when the affected entities have no owner
  // assigned. Ordered as shown in the app.
  repeated Owner owners = 17;

  // An owner (person or team) responsible for an entity, as assigned in
  // Coalesce Quality (natively or synced from a catalog).
  message Owner {
    // Identifier of the owner within the workspace. Matches the id on the
    // Owners API, so callers can fetch the full owner record (contacts,
    // source) from that API.
    string id = 1;
    // Display name of the owner, e.g. a team or person name.
    string title = 2;
    // Deep link to the owner in the Coalesce Quality app.
    string url = 3;
  }
}

message IncidentOpen {
  IncidentSummary incident = 1;
}
message IncidentClosed {
  IncidentSummary incident = 1;
}
message IncidentCancelled {
  IncidentSummary incident = 1;
}

message IncidentSummary {
  string incident_id = 1;
  string incident_url = 2;
  string title = 3;
  string description = 4;
  string description_html = 5;
  google.protobuf.Timestamp started_at = 6;
  optional google.protobuf.Timestamp ended_at = 7;
}
