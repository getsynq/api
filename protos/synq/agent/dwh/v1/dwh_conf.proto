syntax = "proto3";

package synq.agent.dwh.v1;

import "buf/validate/validate.proto";

option go_package = "github.com/getsynq/api/agent/dwh/v1";

// BigQuery specific configuration
message BigQueryConf {
  option (buf.validate.message).cel = {
    id: "bigquery_auth"
    message: "Either service_account_key or service_account_key_file must be provided, but not both"
    expression: "(this.service_account_key != '' && this.service_account_key_file == '') || (this.service_account_key == '' && this.service_account_key_file != '')"
  };

  // GCP project ID
  string project_id = 1 [(buf.validate.field) = {required: true}];
  // Service account key JSON
  string service_account_key = 2 [(buf.validate.field) = {}];
  // Location of service account key file
  string service_account_key_file = 3 [(buf.validate.field) = {}];
  // Region for BigQuery resources
  string region = 4 [(buf.validate.field) = {required: true}];
  // Explicit list of dataset names to scrape (e.g., ['analytics', 'mart_core']).
  // When set, only these datasets are queried — the service account does not need
  // project-level bigquery.datasets.list permission.
  // When empty, all visible datasets in the project are discovered automatically.
  repeated string datasets = 5;
}

message ClickhouseConf {
  // Host address
  string host = 1 [(buf.validate.field) = {
    required: true
    string: {min_len: 1}
  }];
  // Port number (default: 9000 for native protocol)
  int32 port = 2 [(buf.validate.field) = {
    int32: {
      gte: 0
      lte: 65535
    }
  }];
  // Database name
  string database = 3 [(buf.validate.field) = {}];
  // Username for authentication
  string username = 4 [(buf.validate.field) = {required: true}];
  // Password for authentication
  string password = 5 [(buf.validate.field) = {required: true}];
  // Whether to use disable SSL for connection
  bool allow_insecure = 6;
}

message DatabricksConf {
  option (buf.validate.message).cel = {
    id: "databricks_auth"
    message: "Either auth_token or both auth_client and auth_secret must be provided"
    expression: "(has(this.auth_token) && this.auth_token != '') || (has(this.auth_client) && this.auth_client != '' && has(this.auth_secret) && this.auth_secret != '')"
  };

  string workspace_url = 1 [(buf.validate.field) = {
    required: true
    string: {uri: true}
  }];
  optional string auth_token = 2;
  optional string auth_client = 3;
  optional string auth_secret = 4;
  optional string warehouse = 5;
  bool refresh_table_metrics = 6;
  bool refresh_table_metrics_use_scan = 7;
  bool fetch_table_tags = 8;
  bool use_show_create_table = 9;
}

// MySQL specific configuration
message MySQLConf {
  // Host address
  string host = 1 [(buf.validate.field) = {
    required: true
    string: {min_len: 1}
  }];
  // Port number (default: 3306)
  int32 port = 2 [(buf.validate.field) = {
    int32: {
      gte: 0
      lte: 65535
    }
  }];
  // Database name
  string database = 3 [(buf.validate.field) = {required: true}];
  // Username for authentication
  string username = 4 [(buf.validate.field) = {required: true}];
  // Password for authentication
  string password = 5 [(buf.validate.field) = {required: true}];
  // Whether to allow insecure connections
  bool allow_insecure = 6;
  // Additional connection parameters
  map<string, string> params = 7;
}

// Postgres specific configuration
message PostgresConf {
  // Host address
  string host = 1 [(buf.validate.field) = {
    required: true
    string: {min_len: 1}
  }];
  // Port number (default: 5432)
  int32 port = 2 [(buf.validate.field) = {
    int32: {
      gte: 0
      lte: 65535
    }
  }];
  // Database name
  string database = 3 [(buf.validate.field) = {required: true}];
  // Username for authentication
  string username = 4 [(buf.validate.field) = {required: true}];
  // Password for authentication
  string password = 5 [(buf.validate.field) = {required: true}];
  // Whether to allow insecure connections
  bool allow_insecure = 6;
}

// Redshift specific configuration
message RedshiftConf {
  // Host address
  string host = 1 [(buf.validate.field) = {
    required: true
    string: {min_len: 1}
  }];
  // Port number (default: 5439)
  int32 port = 2 [(buf.validate.field) = {
    int32: {
      gte: 0
      lte: 65535
    }
  }];
  // Database name
  string database = 3 [(buf.validate.field) = {required: true}];
  // Username for authentication
  string username = 4 [(buf.validate.field) = {required: true}];
  // Password for authentication
  string password = 5 [(buf.validate.field) = {required: true}];
  // Estimate table freshness based on query logs
  bool freshness_from_query_logs = 6;
}

// Snowflake specific configuration
message SnowflakeConf {
  option (buf.validate.message).cel = {
    id: "snowflake_auth"
    message: "Username required. For auth: use password, private_key/private_key_file, or auth_type=externalbrowser"
    expression: "this.username != '' && (this.password != '' || this.private_key != '' || this.private_key_file != '' || this.auth_type == 'externalbrowser')"
  };

  // Snowflake account identifier
  string account = 1 [(buf.validate.field) = {required: true}];
  // Virtual warehouse to use
  string warehouse = 2 [(buf.validate.field) = {required: true}];
  // Role to assume
  string role = 3 [(buf.validate.field) = {required: true}];
  // Username for authentication
  string username = 4 [(buf.validate.field) = {required: true}];
  // Password for authentication
  string password = 5 [(buf.validate.field) = {}];
  // Content of Private key used for Snowflake authentication
  string private_key = 6 [(buf.validate.field) = {}];
  // Location of the file containing Private key used for Snowflake authentication
  string private_key_file = 11 [(buf.validate.field) = {}];
  // Passphrase used to decode Private key
  optional string private_key_passphrase = 10;
  // Database to connect to
  repeated string databases = 7;
  // Use GET_DDL to determine queries used for table/view creation
  bool use_get_ddl = 8;
  // Name of the database where ACCOUNT_USAGE schema is present, fallbacks to SNOWFLAKE
  optional string account_usage_db = 9;
  // Authentication type: empty (default, uses password or private_key), "externalbrowser" (SSO via browser)
  // When set to "externalbrowser", opens browser for SSO login and caches the token locally.
  optional string auth_type = 12;
}

// Trino specific configuration
message TrinoConf {
  // Host address
  string host = 1 [(buf.validate.field) = {
    required: true
    string: {hostname: true}
  }];
  // Optional port to use, otherwise it will use the default port 8080
  optional int32 port = 2 [(buf.validate.field) = {
    int32: {
      gt: 0
      lte: 65535
    }
  }];
  // Use non-SSL connection to Trino. This should only be enabled if the Trino cluster does not support SSL
  // or if the connection is secured through other means (e.g., a VPN). Defaults to false (SSL enabled).
  optional bool use_plaintext = 3;
  // Username for authentication
  string username = 5 [(buf.validate.field) = {}];
  // Password for authentication
  string password = 6 [(buf.validate.field) = {}];

  // To which catalogs to connect
  repeated string catalogs = 4 [(buf.validate.field) = {
    repeated: {
      items: {required: true}
    }
  }];

  // Use SHOW CREATE VIEW to get views DDLs
  bool no_show_create_view = 7;
  // Use SHOW CREATE TABLE to get tables DDLs
  bool no_show_create_table = 8;
  // Should it fetch system.metadata.materialized_views to get information about Trino MVs
  bool no_materialized_views = 9;
  // Fetch Trino table comments from system.metadata.table_comments
  bool fetch_table_comments = 10;
}

// Microsoft SQL Server / Azure SQL Database specific configuration.
// SQL Server is database-scoped — each connection targets a single database.
//
// Authentication methods (in priority order):
//   1. access_token: pre-acquired Azure AD OAuth token
//   2. fed_auth: Azure AD federated authentication (with optional username/password)
//   3. username + password: standard SQL Server Authentication
message MSSQLConf {
  option (buf.validate.message).cel = {
    id: "mssql_auth"
    message: "Provide access_token, fed_auth method, or both username and password"
    expression: "this.access_token != '' || this.fed_auth != '' || (this.username != '' && this.password != '')"
  };

  // Host address or IP.
  // For Azure SQL: e.g. "yourserver.database.windows.net"
  string host = 1 [(buf.validate.field) = {
    required: true
    string: {min_len: 1}
  }];
  // Port number (default: 1433)
  int32 port = 2 [(buf.validate.field) = {
    int32: {
      gte: 0
      lte: 65535
    }
  }];
  // Database name to connect to
  string database = 3 [(buf.validate.field) = {required: true}];

  // Username for SQL Server Authentication or Azure AD.
  // For Azure AD Service Principal, this is the Application (Client) ID.
  // Leave empty when using access_token or Azure AD Managed Identity.
  string username = 4;
  // Password for SQL Server Authentication or Azure AD client secret
  string password = 5;

  // Skip TLS server certificate verification
  bool trust_cert = 6;
  // Connection encryption mode: "true" (default), "false", "disable"
  string encrypt = 7;

  // Azure AD federated authentication method.
  // When set, the azuread driver is used instead of the standard sqlserver driver.
  // Values: "ActiveDirectoryDefault", "ActiveDirectoryMSI",
  // "ActiveDirectoryServicePrincipal", "ActiveDirectoryAzCli"
  string fed_auth = 8;
  // Pre-acquired Azure AD OAuth access token.
  // When set, takes precedence over all other authentication methods.
  string access_token = 9;
  // Azure AD Application (Client) ID.
  // Used with ActiveDirectoryServicePrincipal and user-assigned MSI.
  string application_client_id = 10;
}

// DuckDB / MotherDuck specific configuration.
// Supports two modes:
//   1. Local/embedded: set database to a file path (e.g. "/tmp/my.duckdb") or ":memory:"
//   2. MotherDuck (cloud): set motherduck_account and motherduck_token
message DuckDBConf {
  option (buf.validate.message).cel = {
    id: "duckdb_mode"
    message: "Provide either database (local mode) or both motherduck_account and motherduck_token (cloud mode)"
    expression: "(this.database != '' && this.motherduck_account == '' && this.motherduck_token == '') || (this.database == '' && this.motherduck_account != '' && this.motherduck_token != '')"
  };

  // Local database path (file path or ":memory:"). Mutually exclusive with motherduck_account.
  string database = 1;
  // MotherDuck account name. Requires motherduck_token.
  string motherduck_account = 2;
  // MotherDuck authentication token. Required when motherduck_account is set.
  string motherduck_token = 3;
}

// Oracle Database specific configuration.
// Oracle connections are scoped to a Pluggable Database (PDB) via the service name.
//
// Authentication methods:
//   1. wallet_path: Oracle Wallet (mTLS) for OCI Autonomous Database
//   2. username + password: standard Oracle database authentication
// Both can be combined (wallet for TLS + explicit credentials).
message OracleConf {
  option (buf.validate.message).cel = {
    id: "oracle_auth"
    message: "Provide wallet_path or both username and password"
    expression: "this.wallet_path != '' || (this.username != '' && this.password != '')"
  };

  // Host address or IP.
  // For OCI: e.g. "adb.eu-frankfurt-1.oraclecloud.com"
  string host = 1 [(buf.validate.field) = {
    required: true
    string: {min_len: 1}
  }];
  // Listener port (default: 1521, OCI Autonomous DB with mTLS uses 1522)
  int32 port = 2 [(buf.validate.field) = {
    int32: {
      gte: 0
      lte: 65535
    }
  }];
  // Service name (PDB name).
  // For OCI Autonomous DB: e.g. "mydb_high", "mydb_low", "mydb_tp"
  string service_name = 3 [(buf.validate.field) = {required: true}];

  // Username for authentication (optional when wallet stores credentials)
  string username = 4;
  // Password for authentication (optional when wallet stores credentials)
  string password = 5;

  // Enable TLS/SSL encryption (TCPS protocol).
  // Required for OCI Autonomous Database. Auto-enabled when wallet_path is set.
  bool ssl = 6;
  // Enable server certificate verification when SSL is enabled
  bool ssl_verify = 7;
  // Path to Oracle Wallet directory for mTLS authentication (OCI Autonomous DB).
  // Contains TLS certificates (cwallet.sso) and optionally stored credentials.
  string wallet_path = 8;

  // Use Oracle Diagnostics Pack (AWR) for persistent query log history.
  // When false, query logs come from V$SQL (in-memory, no additional license).
  // When true, query logs come from DBA_HIST views (requires Diagnostics Pack license).
  bool use_diagnostics_pack = 9;
}
