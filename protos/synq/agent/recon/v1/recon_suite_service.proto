syntax = "proto3";

package synq.agent.recon.v1;

import "buf/validate/validate.proto";
import "google/protobuf/timestamp.proto";
import "synq/agent/recon/v1/recon_suite.proto";
import "synq/agent/recon/v1/recon_suite_config.proto";
import "synq/v1/pagination.proto";
import "synq/v1/scope_authorization.proto";

option go_package = "github.com/getsynq/api/agent/recon/v1";

// SuiteConfigService manages reconciliation suite configurations.
// Managed suites are long-lived, optionally scheduled configs identified by suite_name.
// Ad-hoc suites are one-off configs that get a generated UUID as suite_id.
service SuiteConfigService {
  // Upsert a managed suite config. Creates if new, updates with new version if exists.
  // The suite_id equals the suite name (from ReconcilationSuite.name).
  // Validates the ReconcilationSuite proto. Does NOT validate connections exist.
  rpc UpsertSuiteConfig(UpsertSuiteConfigRequest) returns (UpsertSuiteConfigResponse) {
    option idempotency_level = IDEMPOTENT;
    option (synq.v1.scope_authorization) = {
      scopes: [SCOPE_RECON_EDIT, SCOPE_INGEST_RECON]
    };
  }

  // Submit an ad-hoc suite for one-off execution.
  // Provide either an inline suite or a suite_id referencing an existing managed suite.
  // Optionally apply environment overrides before execution.
  // The client-provided invocation_id ensures idempotency.
  rpc SubmitAdhocSuite(SubmitAdhocSuiteRequest) returns (SubmitAdhocSuiteResponse) {
    option idempotency_level = IDEMPOTENT;
    option (synq.v1.scope_authorization) = {
      scopes: [SCOPE_RECON_EDIT, SCOPE_INGEST_RECON]
    };
  }

  // Get the latest version of a suite config by suite_id.
  // Works for both managed (suite_id = suite_name) and ad-hoc (suite_id = UUID) configs.
  rpc GetSuiteConfig(GetSuiteConfigRequest) returns (GetSuiteConfigResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
    option (synq.v1.scope_authorization) = {
      scopes: [
        SCOPE_RECON_READ,
        SCOPE_INGEST_RECON,
        SCOPE_MCP_READ
      ]
    };
  }

  // List latest suite configs with filtering and pagination.
  // By default returns only managed suites. Set include_adhoc to also include ad-hoc configs.
  rpc ListSuiteConfigs(ListSuiteConfigsRequest) returns (ListSuiteConfigsResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
    option (synq.v1.scope_authorization) = {
      scopes: [
        SCOPE_RECON_READ,
        SCOPE_INGEST_RECON,
        SCOPE_MCP_READ
      ]
    };
  }

  // Delete a managed suite config (soft delete — inserts a deleted version).
  rpc DeleteSuiteConfig(DeleteSuiteConfigRequest) returns (DeleteSuiteConfigResponse) {
    option idempotency_level = IDEMPOTENT;
    option (synq.v1.scope_authorization) = {
      scopes: [SCOPE_RECON_EDIT]
    };
  }

  // Get version history for a suite config.
  rpc ListSuiteConfigVersions(ListSuiteConfigVersionsRequest) returns (ListSuiteConfigVersionsResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
    option (synq.v1.scope_authorization) = {
      scopes: [
        SCOPE_RECON_READ,
        SCOPE_MCP_READ
      ]
    };
  }

  // Get a specific historical version of a suite config.
  rpc GetSuiteConfigVersion(GetSuiteConfigVersionRequest) returns (GetSuiteConfigVersionResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
    option (synq.v1.scope_authorization) = {
      scopes: [
        SCOPE_RECON_READ,
        SCOPE_MCP_READ
      ]
    };
  }

  // Set or remove the schedule and optional environment for a managed suite.
  // This is a focused API for promoting/scheduling a suite without re-submitting the full config.
  rpc SetSuiteSchedule(SetSuiteScheduleRequest) returns (SetSuiteScheduleResponse) {
    option idempotency_level = IDEMPOTENT;
    option (synq.v1.scope_authorization) = {
      scopes: [SCOPE_RECON_EDIT]
    };
  }

  // Preview what a suite would look like after environment overrides.
  // Returns the transformed suite without executing it.
  rpc PreviewSuiteInEnvironment(PreviewSuiteInEnvironmentRequest) returns (PreviewSuiteInEnvironmentResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
    option (synq.v1.scope_authorization) = {
      scopes: [SCOPE_RECON_READ]
    };
  }
}

// --- Managed suite requests ---

message UpsertSuiteConfigRequest {
  // The suite configuration to store. suite_id will equal suite.name.
  ReconcilationSuite suite = 1 [(buf.validate.field).required = true];

  // Optional schedule for the managed suite.
  optional SuiteSchedule schedule = 2;

  // Human-readable summary of what changed in this version.
  optional string change_summary = 3;
}

message UpsertSuiteConfigResponse {
  // The stored suite config.
  SuiteConfig suite_config = 1;
}

// --- Ad-hoc suite requests ---

message SubmitAdhocSuiteRequest {
  option (buf.validate.message).cel = {
    id: "suite_or_suite_id_required"
    message: "either suite or suite_id must be provided"
    expression: "has(this.suite) || has(this.suite_id)"
  };

  // Inline suite configuration. Required when suite_id is not set.
  optional ReconcilationSuite suite = 1;

  // Client-generated invocation ID for idempotency.
  // If an execution with this ID already exists, the call is a no-op.
  string invocation_id = 2 [(buf.validate.field) = {
    required: true
    string: {uuid: true}
  }];

  // Reference to an existing managed suite (alternative to inline suite).
  // When set, the suite config is loaded from the database.
  optional string suite_id = 3 [(buf.validate.field).string.min_len = 1];

  // Optional environment to apply before execution.
  // Overrides connection mappings, table paths, and variables.
  optional string environment_name = 4 [(buf.validate.field).string.min_len = 1];
}

message SubmitAdhocSuiteResponse {
  // The stored suite config (includes the invocation_id as suite_id).
  SuiteConfig suite_config = 1;
}

// --- Common requests ---

message GetSuiteConfigRequest {
  // Suite ID to look up. For managed suites this equals the suite name,
  // for ad-hoc suites this is the generated UUID.
  string suite_id = 1 [(buf.validate.field) = {
    required: true
    string: {min_len: 1}
  }];
}

message GetSuiteConfigResponse {
  SuiteConfig suite_config = 1;
}

message ListSuiteConfigsRequest {
  // Filter suites using a specific connection name. When empty, returns all.
  optional string connection_name = 1;

  // Pagination parameters.
  optional synq.v1.Pagination pagination = 2;

  // When true, also include ad-hoc suite configs in the results.
  // By default only managed suites are returned.
  bool include_adhoc = 3;
}

message ListSuiteConfigsResponse {
  repeated SuiteConfig suite_configs = 1;

  // Pagination info for fetching the next page.
  synq.v1.PageInfo page_info = 2;
}

message DeleteSuiteConfigRequest {
  // Suite ID to delete.
  string suite_id = 1 [(buf.validate.field) = {
    required: true
    string: {min_len: 1}
  }];
}

message DeleteSuiteConfigResponse {}

message ListSuiteConfigVersionsRequest {
  // Suite ID to get version history for.
  string suite_id = 1 [(buf.validate.field) = {
    required: true
    string: {min_len: 1}
  }];

  // Pagination parameters.
  optional synq.v1.Pagination pagination = 2;
}

message ListSuiteConfigVersionsResponse {
  repeated SuiteConfigVersion versions = 1;

  // Pagination info for fetching the next page.
  synq.v1.PageInfo page_info = 2;
}

message GetSuiteConfigVersionRequest {
  // Suite ID.
  string suite_id = 1 [(buf.validate.field) = {
    required: true
    string: {min_len: 1}
  }];

  // Version timestamp.
  google.protobuf.Timestamp state_at = 2 [(buf.validate.field).required = true];
}

message GetSuiteConfigVersionResponse {
  SuiteConfigVersion version = 1;
}

message SetSuiteScheduleRequest {
  // Suite ID of the managed suite to update.
  string suite_id = 1 [(buf.validate.field) = {
    required: true
    string: {min_len: 1}
  }];

  // Schedule to set. When absent, removes the schedule.
  optional SuiteSchedule schedule = 2;

  // Optional environment name to associate with scheduled runs.
  // Empty string clears the environment association.
  optional string environment_name = 3;
}

message SetSuiteScheduleResponse {
  // The updated suite config.
  SuiteConfig suite_config = 1;
}

// --- Response messages ---

// SuiteConfig represents the latest version of a reconciliation suite configuration.
message SuiteConfig {
  // Unique identifier. Equals suite_name for managed suites, UUID for ad-hoc.
  string suite_id = 1;

  // Human-readable suite name from ReconcilationSuite.name.
  string suite_name = 2;

  optional string suite_title = 3;
  optional string suite_description = 4;

  // "managed" or "adhoc".
  string suite_type = 5;

  // The full suite configuration.
  ReconcilationSuite suite = 6;

  // Schedule (only present for managed suites).
  optional SuiteSchedule schedule = 7;

  // Deduplicated connection names referenced by this suite.
  repeated string connection_names = 8;

  // Summary of each reconciliation in the suite.
  repeated ReconciliationConfigSummary reconciliation_summaries = 9;

  // Who last updated this config.
  optional SuiteConfigActor updated_by = 10;

  // When this version was created.
  google.protobuf.Timestamp state_at = 11;

  // Environment name associated with scheduled runs (empty = no environment).
  optional string environment_name = 12;
}

// SuiteConfigVersion represents a historical version of a suite config.
message SuiteConfigVersion {
  string suite_id = 1;
  string suite_name = 2;
  optional string suite_title = 3;
  optional string suite_description = 4;
  string suite_type = 5;

  // The full suite configuration at this version.
  ReconcilationSuite suite = 6;

  // Schedule at this version.
  optional SuiteSchedule schedule = 7;

  // Connection names at this version.
  repeated string connection_names = 8;

  // Reconciliation summaries at this version.
  repeated ReconciliationConfigSummary reconciliation_summaries = 9;

  // Who made this change.
  optional SuiteConfigActor updated_by = 10;

  // When this version was created.
  google.protobuf.Timestamp state_at = 11;

  // Whether this version represents a deletion.
  bool deleted = 12;

  // Human-readable summary of what changed.
  optional string change_summary = 13;

  // Environment name associated with scheduled runs at this version.
  optional string environment_name = 14;
}

message PreviewSuiteInEnvironmentRequest {
  // Suite to preview.
  string suite_id = 1 [(buf.validate.field) = {
    required: true
    string: {min_len: 1}
  }];

  // Environment to apply.
  string environment_name = 2 [(buf.validate.field) = {
    required: true
    string: {min_len: 1}
  }];
}

message PreviewSuiteInEnvironmentResponse {
  // The suite after environment overrides are applied.
  ReconcilationSuite transformed_suite = 1;

  // Map of "recon_name.side" -> resolved FQN string.
  map<string, string> resolved_table_references = 2;

  // Variables after merging environment overrides.
  map<string, string> merged_variables = 3;
}
