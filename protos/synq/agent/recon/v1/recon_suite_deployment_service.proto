syntax = "proto3";

package synq.agent.recon.v1;

import "buf/validate/validate.proto";
import "google/api/annotations.proto";
import "google/protobuf/duration.proto";
import "google/protobuf/timestamp.proto";
import "synq/agent/recon/v1/recon_suite.proto";
import "synq/agent/recon/v1/recon_suite_config.proto";
import "synq/entities/v1/annotation.proto";
import "synq/issues/actor/v1/actor.proto";
import "synq/v1/pagination.proto";
import "synq/v1/scope_authorization.proto";

option go_package = "github.com/getsynq/api/agent/recon/v1";

// SuiteDeploymentService is the platform plane of reconciliation.
//
// SuiteConfigService is the developer/authoring sandbox (edit, version, run
// ad-hoc with your own credentials — preview-only, no Entity, no Run, no
// Issue). A deployment is what SYNQ actually runs on the workspace's behalf:
// a frozen snapshot of a suite config, mapped to workspace-level SYNQ
// integrations, optionally scheduled or triggerable by API.
//
// Identity: every deployment has a stable deployment_id (UUIDv7) assigned on
// first promote. It survives re-promotes, schedule/mapping changes, and
// pause/resume. Downstream AssetCommand / RunCommand publication keys off
// deployment_id so Entity identity does not fragment on promote churn.
service SuiteDeploymentService {
  // Promote a suite config into production. Freezes a snapshot of the config
  // and stores the connection → integration mapping. Creates a new deployment
  // on first call; re-promotes the same suite_id (reusing its deployment_id)
  // on subsequent calls.
  rpc PromoteSuite(PromoteSuiteRequest) returns (PromoteSuiteResponse) {
    option idempotency_level = IDEMPOTENT;
    option (synq.v1.scope_authorization) = {
      scopes: [SCOPE_RECON_PROMOTE]
    };
  }

  // Unpromote a deployment. Marks it inactive; scheduler and API triggers
  // stop. Deployment history is preserved; re-promoting the same suite_id
  // reuses the original deployment_id.
  rpc UnpromoteSuite(UnpromoteSuiteRequest) returns (UnpromoteSuiteResponse) {
    option idempotency_level = IDEMPOTENT;
    option (synq.v1.scope_authorization) = {
      scopes: [SCOPE_RECON_PROMOTE]
    };
  }

  // Change schedule and/or triggerable_by_api on an existing deployment
  // without re-promoting the config snapshot or touching mappings.
  rpc UpdateDeploymentSchedule(UpdateDeploymentScheduleRequest) returns (UpdateDeploymentScheduleResponse) {
    option idempotency_level = IDEMPOTENT;
    option (synq.v1.scope_authorization) = {
      scopes: [SCOPE_RECON_PROMOTE]
    };
  }

  // Rewire connection → integration mappings on an existing deployment
  // without re-promoting the config snapshot.
  rpc UpdateDeploymentMappings(UpdateDeploymentMappingsRequest) returns (UpdateDeploymentMappingsResponse) {
    option idempotency_level = IDEMPOTENT;
    option (synq.v1.scope_authorization) = {
      scopes: [SCOPE_RECON_PROMOTE]
    };
  }

  // Replace the deployment-level annotation overlay on an existing
  // deployment. Annotations are merged with suite-level and case-level
  // annotations from the frozen suite snapshot at promote/update time, then
  // surfaced on PromotedReconSuiteMetadata / PromotedReconCaseMetadata for
  // every asset under the deployment.
  rpc UpdateDeploymentAnnotations(UpdateDeploymentAnnotationsRequest) returns (UpdateDeploymentAnnotationsResponse) {
    option idempotency_level = IDEMPOTENT;
    option (synq.v1.scope_authorization) = {
      scopes: [SCOPE_RECON_PROMOTE]
    };
  }

  // Patch the per-case CaseFailureImpact map on an existing deployment
  // without re-promoting the suite snapshot. Useful for "apply to all"
  // FE actions and one-off toggles between RAISE_ISSUE_ON_TABLES and
  // SHOW_ON_TABLES. Re-renders PromotedReconCaseMetadata so the
  // error_tables / shown_tables split reflects the new policy
  // immediately.
  //
  // Merge semantics: keys present in the request overwrite the stored
  // value for that case. Keys absent from the request are left
  // untouched (no implicit reset). Sending CASE_FAILURE_IMPACT_UNSPECIFIED
  // clears the override for that case (falls back to the default
  // RAISE_ISSUE_ON_TABLES). Unknown case names are rejected with
  // INVALID_ARGUMENT so the FE catches typos before the deployment is
  // mutated.
  rpc UpdateDeploymentCaseImpacts(UpdateDeploymentCaseImpactsRequest) returns (UpdateDeploymentCaseImpactsResponse) {
    option idempotency_level = IDEMPOTENT;
    option (synq.v1.scope_authorization) = {
      scopes: [SCOPE_RECON_PROMOTE]
    };
  }

  // Pause a deployment. Scheduled and API-triggered runs are suppressed until
  // `until` is reached, or indefinitely when `until` is absent.
  rpc PauseDeployment(PauseDeploymentRequest) returns (PauseDeploymentResponse) {
    option idempotency_level = IDEMPOTENT;
    option (synq.v1.scope_authorization) = {
      scopes: [SCOPE_RECON_PROMOTE]
    };
  }

  // Resume a paused deployment.
  rpc ResumeDeployment(ResumeDeploymentRequest) returns (ResumeDeploymentResponse) {
    option idempotency_level = IDEMPOTENT;
    option (synq.v1.scope_authorization) = {
      scopes: [SCOPE_RECON_PROMOTE]
    };
  }

  // Fetch a deployment by suite_id or deployment_id.
  rpc GetSuiteDeployment(GetSuiteDeploymentRequest) returns (GetSuiteDeploymentResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
    option (synq.v1.scope_authorization) = {
      scopes: [
        SCOPE_RECON_READ,
        SCOPE_MCP_READ
      ]
    };
  }

  // List deployments for the caller's workspace. Filters support answering
  // "what is SYNQ running on behalf of this workspace?" and "which
  // deployments use this SYNQ integration?".
  rpc ListSuiteDeployments(ListSuiteDeploymentsRequest) returns (ListSuiteDeploymentsResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
    option (synq.v1.scope_authorization) = {
      scopes: [
        SCOPE_RECON_READ,
        SCOPE_MCP_READ
      ]
    };
  }

  // List the append-only history of a deployment (every promote,
  // re-promote, schedule/mapping change, pause/resume, unpromote).
  rpc ListSuiteDeploymentHistory(ListSuiteDeploymentHistoryRequest) returns (ListSuiteDeploymentHistoryResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
    option (synq.v1.scope_authorization) = {
      scopes: [
        SCOPE_RECON_READ,
        SCOPE_MCP_READ
      ]
    };
  }

  // Trigger an on-demand execution of a promoted deployment. Enqueues a run
  // using the frozen suite snapshot and connection mappings stored on the
  // deployment row — execution uses platform integration credentials, not the
  // caller's. Returns the freshly-allocated `run_id` so callers can poll
  // RunStateService for status.
  //
  // Preconditions:
  //   - Deployment must exist and be `active`.
  //   - Deployment must have `triggerable_by_api = true` (FAILED_PRECONDITION
  //     otherwise).
  //   - Deployment must not be paused (FAILED_PRECONDITION when
  //     `paused_until` is set and in the future).
  rpc TriggerDeployment(TriggerDeploymentRequest) returns (TriggerDeploymentResponse) {
    option idempotency_level = IDEMPOTENT;
    option (synq.v1.scope_authorization) = {
      scopes: [SCOPE_RECON_PROMOTE]
    };
    // REST: POST /api/recon/v1/deployments/trigger
    // body: {"deployment_id":"<uuid>"} or {"suite_id":"<name>"} plus the
    // standard actor. Action-as-last-segment matches the path convention
    // used elsewhere (see monitors/custom-monitors/v1/delete,
    // monitors/automated/v1/deployment-rules/deployed). The lookup is a
    // oneof so we can't bind a single ID to a path segment.
    option (google.api.http) = {
      post: "/api/recon/v1/deployments/trigger"
      body: "*"
    };
  }
}

// Maps a reconciliation-connection name (as referenced in the suite config)
// to a concrete SYNQ integration. Used at execution time to resolve DWH
// credentials.
//
// Two credential planes are defined on the wire:
//   - integration_id: workspace-level integration. Required for deployment
//     paths and acceptable for adhoc submission when the caller has
//     SCOPE_INTEGRATION_EDIT.
//   - user_integration_id: per-user OAuth-backed integration. Accepted
//     only on adhoc submission, and only when a user identity is present
//     in the calling context. Deployment paths reject this branch
//     unconditionally — scheduled runs must be able to fire without any
//     particular user being available, so they always run with workspace
//     credentials.
//
// Wire-compatible with the previous shape: the original `integration_id`
// (field 2) is preserved as one branch of the oneof so existing serialized
// rows decode unchanged.
message ConnectionMapping {
  // Connection name as it appears in the suite config
  // (e.g. ReconcilationSuite.reconciliations[].source.connection).
  string connection_name = 1 [(buf.validate.field) = {
    required: true
    string: {min_len: 1}
  }];

  // Source is required when the caller supplies a mapping — empty
  // ConnectionMapping entries are nonsensical. The "no mapping at all"
  // case (resolve connection_name as a workspace integration_id) is
  // expressed by omitting the entry from the connection_mappings list,
  // not by sending one with no source set.
  oneof source {
    option (buf.validate.oneof).required = true;

    // Workspace-level integration (credentials owned by the workspace).
    string integration_id = 2 [(buf.validate.field).string.min_len = 1];

    // Per-user integration ID (user-level credentials). Server requires a
    // user identity in the calling context to accept this branch.
    string user_integration_id = 3 [(buf.validate.field).string.min_len = 1];
  }
}

// Reason why a single connection could not be resolved.
enum ConnectionResolutionReason {
  CONNECTION_RESOLUTION_REASON_UNSPECIFIED = 0;
  // No mapping was supplied and no workspace integration matches the
  // connection name.
  CONNECTION_RESOLUTION_REASON_NOT_PROVIDED = 1;
  // Mapping references an integration that does not exist or the caller
  // cannot see it.
  CONNECTION_RESOLUTION_REASON_INTEGRATION_NOT_FOUND = 2;
  // Mapping uses a credential plane the caller is not allowed to use
  // (e.g. user_integration_id without a user identity, or
  // workspace integration_id without SCOPE_INTEGRATION_EDIT).
  CONNECTION_RESOLUTION_REASON_CREDENTIAL_NOT_ALLOWED = 3;
  // Integration exists but the allow_reconciliation_adhoc /
  // allow_reconciliation_deploy capability gate is disabled for it.
  CONNECTION_RESOLUTION_REASON_CAPABILITY_DISABLED = 4;
}

// One entry per connection name the server failed to resolve. Returned
// inside ConnectionResolutionFailure as the structured error detail of a
// FAILED_PRECONDITION on adhoc submission or deployment promote/update.
message UnresolvedConnection {
  // Connection name as referenced by the suite config.
  string connection_name = 1;
  // Why the server could not satisfy the mapping.
  ConnectionResolutionReason reason = 2;
  // Optional human-readable elaboration ("integration X has reconciliation
  // adhoc disabled by workspace admin", etc.). Already includes workspace
  // / suite context — safe to surface verbatim.
  string message = 3;
  // Suggested integration ids the caller could pick from. Filtered by the
  // capability the failing call needs (RECONCILIATION_ADHOC for adhoc,
  // RECONCILIATION_DEPLOY for deployment) so the UI can render a picker
  // directly without re-querying.
  repeated string candidate_integration_ids = 4;
}

// Error-details payload attached to FAILED_PRECONDITION when a recon
// request cannot be honoured because one or more suite connection names
// have no usable mapping. The caller should prompt the user to bind every
// listed connection and retry.
message ConnectionResolutionFailure {
  repeated UnresolvedConnection unresolved = 1;
}

enum DeploymentAction {
  DEPLOYMENT_ACTION_UNSPECIFIED = 0;
  DEPLOYMENT_ACTION_PROMOTED = 1;
  DEPLOYMENT_ACTION_REPROMOTED = 2;
  DEPLOYMENT_ACTION_SCHEDULE_CHANGED = 3;
  DEPLOYMENT_ACTION_MAPPINGS_CHANGED = 4;
  DEPLOYMENT_ACTION_PAUSED = 5;
  DEPLOYMENT_ACTION_RESUMED = 6;
  DEPLOYMENT_ACTION_UNPROMOTED = 7;
  DEPLOYMENT_ACTION_ANNOTATIONS_CHANGED = 8;
  DEPLOYMENT_ACTION_CASE_IMPACTS_CHANGED = 9;
}

// SuiteDeployment is the latest state of a deployment (current row).
message SuiteDeployment {
  // Stable platform identity (UUIDv7). Preserved across re-promotes,
  // pause/resume, and unpromote → re-promote cycles. Downstream
  // AssetCommand / RunCommand reference this.
  string deployment_id = 1;

  // Suite this deployment came from.
  string suite_id = 2;
  string suite_name = 3;
  optional string suite_title = 4;
  optional string suite_description = 5;

  // False after UnpromoteSuite. Scheduler and triggers stop.
  bool active = 6;

  // When set and in the future, scheduled/triggered runs are suppressed.
  // An indefinite pause uses a far-future sentinel timestamp.
  optional google.protobuf.Timestamp paused_until = 7;
  optional string paused_reason = 8;

  // Frozen snapshot of the suite config at promote time.
  ReconcilationSuite suite = 9;

  // Mapping used at execution time to resolve DWH credentials.
  repeated ConnectionMapping connection_mappings = 10;

  // Schedule (if any). Absent = no cron; use triggerable_by_api.
  optional SuiteSchedule schedule = 11;

  // When true, a (future) TriggerDeployment RPC may execute this deployment.
  bool triggerable_by_api = 12;

  // When true (default), scheduled / triggered runs of this deployment
  // drill into mismatched reconciliations via bisection after the
  // quick check. Per-recon `bisection.enabled` still gates whether
  // each recon is eligible for drill, so this is the deployment-level
  // off switch on top.
  optional bool run_bisection = 22;

  // Maximum wall-clock time for a single run of this deployment (quick
  // check plus any bisection drill). A run that exceeds it is cancelled
  // and marked failed rather than left pending. Absent means the server
  // default applies. The effective value is clamped to a supported range
  // at execution time, so very small or very large values are bounded.
  // Set this to bound cost on expensive warehouses where a heavy drill
  // can run for a long time.
  optional google.protobuf.Duration execution_timeout = 26;

  // Denormalized summaries so listing callers don't need to parse the snapshot.
  repeated string connection_names = 13;
  repeated string integration_ids = 14;
  repeated ReconciliationConfigSummary reconciliation_summaries = 15;

  // Where this deployment's snapshot came from.
  string source_suite_type = 16; // "managed" or "adhoc"
  google.protobuf.Timestamp source_config_state_at = 17;

  // Most recent event timestamp.
  google.protobuf.Timestamp state_at = 18;
  DeploymentAction last_action = 19;
  optional synq.issues.actor.v1.Actor last_actor = 20;
  optional string last_change_summary = 21;

  // Next cron occurrence computed live from `schedule` at response
  // time. Absent when there's no schedule, when the deployment is
  // inactive/paused, or when the schedule expression no longer yields
  // an upcoming occurrence (e.g. an iCal RRULE that has finished).
  // Use this for "Next run: …" UI hints — it's the authoritative
  // upcoming-tick source, independent of any pre-materialised
  // execution_jobs / run_state rows.
  optional google.protobuf.Timestamp next_run_at = 23;

  // Deployment-level annotation overlay. Applied on top of the suite-level
  // and case-level annotations baked into the frozen suite snapshot. The
  // merged, deduplicated list lives on PromotedReconSuiteMetadata /
  // PromotedReconCaseMetadata — this field exposes only the deployment's
  // own overlay so callers can render and edit it independently.
  repeated synq.entities.v1.Annotation deployment_annotations = 24;

  // Effective per-case CaseFailureImpact map currently in force for this
  // deployment. Keyed by case `name`. Cases without an entry behave as
  // RAISE_ISSUE_ON_TABLES. Drives whether the runner attaches each
  // case's referenced tables to Run.target (issue-raising) or
  // Run.extra_references (visibility only) — see
  // PromotedReconCaseMetadata.error_tables / shown_tables for the
  // resolved table lists.
  map<string, CaseFailureImpact> case_failure_impacts = 25;
}

// SuiteDeploymentHistoryEntry is a single event in the deployment's history.
message SuiteDeploymentHistoryEntry {
  string deployment_id = 1;
  string suite_id = 2;
  google.protobuf.Timestamp state_at = 3;
  DeploymentAction action = 4;

  // State of the deployment at the moment of this event.
  bool active = 5;
  optional google.protobuf.Timestamp paused_until = 6;
  optional string paused_reason = 7;
  optional SuiteSchedule schedule = 8;
  bool triggerable_by_api = 9;
  repeated ConnectionMapping connection_mappings = 10;
  // run_bisection setting at this point in time (default true).
  optional bool run_bisection = 15;

  // execution_timeout setting at this point in time. Absent = server default.
  optional google.protobuf.Duration execution_timeout = 18;

  // Only filled for PROMOTED / REPROMOTED events (snapshot changes).
  optional ReconcilationSuite suite = 11;
  optional google.protobuf.Timestamp source_config_state_at = 12;

  optional synq.issues.actor.v1.Actor actor = 13;
  optional string change_summary = 14;

  // Deployment-level annotation overlay at this point in time. Filled on
  // every history entry (annotation changes carry the full new list, other
  // events carry the snapshot at the time of the event).
  repeated synq.entities.v1.Annotation deployment_annotations = 16;

  // Effective per-case CaseFailureImpact map at this point in time.
  // Snapshot semantics — every history entry carries the full map in
  // force right after the event was recorded.
  map<string, CaseFailureImpact> case_failure_impacts = 17;
}

// --- Requests / responses ---

message PromoteSuiteRequest {
  // Suite to promote. For managed suites pass the suite name; for ad-hoc
  // pass the UUID suite_id.
  string suite_id = 1 [(buf.validate.field) = {
    required: true
    string: {min_len: 1}
  }];

  // Specific version to promote. Absent = latest.
  optional google.protobuf.Timestamp state_at = 2;

  // Mappings for connections that don't resolve to a workspace
  // integration by name. Connections whose name already matches a
  // workspace integration id (the common FE-authored shape) can be
  // omitted; the BindingResolver legacy fallback resolves them. Promote
  // fails if any connection in the suite cannot be resolved.
  repeated ConnectionMapping connection_mappings = 3;

  // Optional cron/iCal schedule. Absent on a re-promote preserves the
  // existing deployment's schedule (cron or iCal) verbatim; absent on a
  // fresh promote means no schedule. To remove a schedule from an existing
  // deployment use UpdateDeploymentSchedule (clear), not a re-promote.
  optional SuiteSchedule schedule = 4;

  // When true, a TriggerDeployment RPC may execute this deployment on demand.
  // Optional so re-promotes can omit it: an absent value preserves the
  // existing deployment's setting (a fresh promote defaults to false).
  optional bool triggerable_by_api = 5;

  // Controls whether mismatched recons drill after the quick check.
  // Absent on a re-promote preserves the existing deployment's setting;
  // absent on a fresh promote defaults to true (bisection enabled). Set
  // to false for cheap quick-check-only deployments. Per-recon
  // `bisection.enabled` still gates which recons are eligible for drill.
  optional bool run_bisection = 8;

  // Maximum wall-clock time for a single run of this deployment. Absent on
  // a fresh promote uses the server default; absent on a re-promote
  // preserves the existing deployment's setting. The server clamps the
  // effective value to a supported range. Set a lower value to bound cost
  // on expensive warehouses, or a higher value for large tables whose
  // drill legitimately needs longer than the default.
  optional google.protobuf.Duration execution_timeout = 12;

  optional string change_summary = 6;

  // Optional client-supplied deployment id (UUID). Use this to make
  // PromoteSuite idempotent across retries: if the original request wrote a
  // row but the response was lost, the client re-issues with the same
  // deployment_id and the second call resolves to the same deployment.
  //
  // Server semantics:
  //   - absent  : reuse the existing deployment for this suite_id, or
  //               generate a fresh UUIDv7
  //   - present, no row exists for (workspace, deployment_id) : adopt as-is
  //   - present, row exists with same suite_id                : idempotent retry
  //   - present, row exists with different suite_id           : ALREADY_EXISTS
  optional string deployment_id = 7 [(buf.validate.field).string.min_len = 1];

  // Actor performing the promotion. Required.
  synq.issues.actor.v1.Actor actor = 9 [(buf.validate.field) = {required: true}];

  // Initial deployment-level annotation overlay. Merged with suite-level
  // and case-level annotations from the frozen suite snapshot. Use
  // UpdateDeploymentAnnotations to mutate later without re-promoting.
  repeated synq.entities.v1.Annotation deployment_annotations = 10;

  // Per-case override controlling how the tables referenced by each
  // reconciliation case propagate onto runs. Keyed by case `name` from
  // the suite config. When a key is omitted on re-promote, the prior
  // deployment's value is retained — operators only set keys they want
  // to change, and the FE can offer an "apply to all" action by sending
  // the same value under every case name. New cases (not present in any
  // previous deployment of this suite_id) default to
  // RAISE_ISSUE_ON_TABLES when unset.
  //
  // Sending CASE_FAILURE_IMPACT_UNSPECIFIED for a known case is treated
  // as "no opinion, keep current"; to actively reset to the default,
  // either omit the case or send RAISE_ISSUE_ON_TABLES.
  map<string, CaseFailureImpact> case_failure_impacts = 11;
}

message PromoteSuiteResponse {
  SuiteDeployment deployment = 1;
}

message UnpromoteSuiteRequest {
  string suite_id = 1 [(buf.validate.field) = {
    required: true
    string: {min_len: 1}
  }];

  optional string reason = 2;

  // Actor performing the unpromote. Required.
  synq.issues.actor.v1.Actor actor = 3 [(buf.validate.field) = {required: true}];
}

message UnpromoteSuiteResponse {
  SuiteDeployment deployment = 1;
}

message UpdateDeploymentScheduleRequest {
  string suite_id = 1 [(buf.validate.field) = {
    required: true
    string: {min_len: 1}
  }];

  // Partial update (PATCH): every field below is absent = preserve current
  // setting. This lets a caller flip a single flag (e.g. run_bisection)
  // without re-stating the schedule.

  // Presence-based:
  //   - absent           = preserve current schedule
  //   - present, empty    = clear the schedule (an empty SuiteSchedule has
  //                         no cron, which the deployment row stores as no
  //                         schedule)
  //   - present, with cron = replace the schedule
  optional SuiteSchedule schedule = 2;
  // Absent = preserve current setting. Otherwise update triggerable_by_api.
  optional bool triggerable_by_api = 3;
  optional string change_summary = 4;
  // Absent = preserve current setting. Otherwise update the
  // deployment's run_bisection flag.
  optional bool run_bisection = 5;

  // Absent = preserve current setting. Otherwise update the deployment's
  // execution_timeout (maximum wall-clock budget for a single run). The
  // server clamps the effective value to a supported range at run time.
  optional google.protobuf.Duration execution_timeout = 7;

  // Actor performing the schedule update. Required.
  synq.issues.actor.v1.Actor actor = 6 [(buf.validate.field) = {required: true}];
}

message UpdateDeploymentScheduleResponse {
  SuiteDeployment deployment = 1;
}

message UpdateDeploymentMappingsRequest {
  string suite_id = 1 [(buf.validate.field) = {
    required: true
    string: {min_len: 1}
  }];

  // Same shape as PromoteSuiteRequest.connection_mappings — entries are
  // optional and apply only to connections that don't resolve by name.
  repeated ConnectionMapping connection_mappings = 2;
  optional string change_summary = 3;

  // Actor performing the mapping update. Required.
  synq.issues.actor.v1.Actor actor = 4 [(buf.validate.field) = {required: true}];
}

message UpdateDeploymentMappingsResponse {
  SuiteDeployment deployment = 1;
}

message UpdateDeploymentAnnotationsRequest {
  string suite_id = 1 [(buf.validate.field) = {
    required: true
    string: {min_len: 1}
  }];

  // Full replacement for the deployment-level annotation overlay. Pass an
  // empty list to clear all deployment-level annotations (suite/case
  // annotations from the frozen snapshot still apply).
  repeated synq.entities.v1.Annotation deployment_annotations = 2;

  optional string change_summary = 3;

  // Actor performing the annotation update. Required.
  synq.issues.actor.v1.Actor actor = 4 [(buf.validate.field) = {required: true}];
}

message UpdateDeploymentAnnotationsResponse {
  SuiteDeployment deployment = 1;
}

message UpdateDeploymentCaseImpactsRequest {
  string suite_id = 1 [(buf.validate.field) = {
    required: true
    string: {min_len: 1}
  }];

  // Partial patch of the per-case impact map. See
  // UpdateDeploymentCaseImpacts RPC docs for merge / clear semantics.
  map<string, CaseFailureImpact> case_failure_impacts = 2;

  optional string change_summary = 3;

  // Actor performing the update. Required.
  synq.issues.actor.v1.Actor actor = 4 [(buf.validate.field) = {required: true}];
}

message UpdateDeploymentCaseImpactsResponse {
  SuiteDeployment deployment = 1;
}

message PauseDeploymentRequest {
  string suite_id = 1 [(buf.validate.field) = {
    required: true
    string: {min_len: 1}
  }];

  // Absent = pause indefinitely.
  optional google.protobuf.Timestamp until = 2;
  optional string reason = 3;

  // Actor performing the pause. Required.
  synq.issues.actor.v1.Actor actor = 4 [(buf.validate.field) = {required: true}];
}

message PauseDeploymentResponse {
  SuiteDeployment deployment = 1;
}

message ResumeDeploymentRequest {
  string suite_id = 1 [(buf.validate.field) = {
    required: true
    string: {min_len: 1}
  }];

  // Actor performing the resume. Required.
  synq.issues.actor.v1.Actor actor = 2 [(buf.validate.field) = {required: true}];
}

message ResumeDeploymentResponse {
  SuiteDeployment deployment = 1;
}

message GetSuiteDeploymentRequest {
  // Exactly one of the two must be set.
  oneof lookup {
    string suite_id = 1;
    string deployment_id = 2;
  }
}

message GetSuiteDeploymentResponse {
  SuiteDeployment deployment = 1;
}

message ListSuiteDeploymentsRequest {
  optional synq.v1.Pagination pagination = 1;

  // Return only deployments wired to this SYNQ integration (match against
  // the deployment's connection_mappings).
  optional string integration_id = 2;

  // Filter by triggerable_by_api flag.
  optional bool triggerable_by_api = 3;

  // When true (default), only active deployments are returned.
  bool active_only = 4;

  // When false (default), paused deployments are excluded.
  bool include_paused = 5;
}

message ListSuiteDeploymentsResponse {
  repeated SuiteDeployment deployments = 1;
  synq.v1.PageInfo page_info = 2;
}

message ListSuiteDeploymentHistoryRequest {
  oneof lookup {
    string suite_id = 1;
    string deployment_id = 2;
  }

  optional synq.v1.Pagination pagination = 3;
}

message ListSuiteDeploymentHistoryResponse {
  repeated SuiteDeploymentHistoryEntry entries = 1;
  synq.v1.PageInfo page_info = 2;
}

message TriggerDeploymentRequest {
  // Exactly one of the two must be set.
  oneof lookup {
    string suite_id = 1;
    string deployment_id = 2;
  }

  // Actor triggering the run. Required.
  synq.issues.actor.v1.Actor actor = 3 [(buf.validate.field) = {required: true}];

  // Per-trigger override for the deployment's stored run_bisection flag.
  // Unset (default) inherits the deployment's value so a "Run now" click
  // matches what the cron schedule would have done. Set explicitly to
  // false for a cheap quick-check-only run without bisection drill-down.
  optional bool run_bisection = 4;

  // Per-trigger override for the deployment's stored execution_timeout.
  // Unset (default) inherits the deployment's value so a "Run now" click
  // matches what the cron schedule would have done. Set explicitly to bound
  // a one-off run to a shorter or longer wall-clock budget. The server
  // clamps the effective value to a supported range.
  optional google.protobuf.Duration execution_timeout = 5;
}

message TriggerDeploymentResponse {
  // Identity of the deployment that was triggered (canonical form even when
  // the request used `suite_id`).
  string deployment_id = 1;

  // Stable opaque identifier of the enqueued run. Pass this to
  // RunStateService to track lifecycle.
  string run_id = 2;

  // When the run is scheduled to start. For TriggerDeployment this is
  // ~now(); the worker will pick it up shortly.
  google.protobuf.Timestamp scheduled_at = 3;
}
