syntax = "proto3";

package synq.agent.recon.v1;

import "buf/validate/validate.proto";
import "google/protobuf/timestamp.proto";
import "synq/agent/recon/v1/recon_suite.proto";
import "synq/entities/v1/annotation.proto";

option go_package = "github.com/getsynq/api/agent/recon/v1";

// Schedule configuration for managed suites.
message SuiteSchedule {
  // IANA timezone, e.g. "Europe/Warsaw".
  string timezone = 1 [(buf.validate.field) = {
    required: true
    string: {min_len: 1}
  }];

  oneof type {
    CronSchedule cron = 2;
    ICalSchedule ical = 3;
  }
}

message CronSchedule {
  // Standard cron expression (e.g. "0 */6 * * *").
  string expression = 1 [(buf.validate.field) = {
    required: true
    string: {min_len: 1}
  }];
}

message ICalSchedule {
  // RFC 5545 RRULE recurrence rule (e.g. "FREQ=MONTHLY;BYDAY=TH;BYSETPOS=-1").
  // DTSTART should be set via the dtstart field below rather than inline in the rule.
  string recurrence_rule = 1 [(buf.validate.field) = {
    required: true
    string: {min_len: 1}
  }];

  // Anchor time for the recurrence rule. Wall-clock time interpreted in the
  // schedule's timezone. Defines when the schedule starts and aligns occurrences.
  // If not set and no DTSTART is present in the recurrence_rule, defaults to now().
  optional google.protobuf.Timestamp dtstart = 2;
}

// Summary of a single reconciliation within a suite config (for listing without parsing full config).
message ReconciliationConfigSummary {
  string name = 1;
  optional string title = 2;
  optional string description = 3;
  string source_connection = 4;
  string target_connection = 5;
  ReconcilationMode mode = 6;

  // Resolved annotation list for this case. For suite-config summaries this
  // is suite-level annotations + case-level annotations (deduped). For
  // deployment summaries the deployment-level overlay is also merged in.
  // Already deduplicated by (name, value); ready for direct display.
  repeated synq.entities.v1.Annotation annotations = 7;
}

