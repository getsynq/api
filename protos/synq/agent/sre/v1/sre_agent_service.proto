syntax = "proto3";

package synq.agent.sre.v1;

import "buf/validate/validate.proto";
import "google/protobuf/timestamp.proto";
import "synq/agent/sre/v1/llm_service.proto";
import "synq/entities/v1/identifier.proto";
import "synq/v1/scope_authorization.proto";

option go_package = "github.com/getsynq/api/agent/sre/v1";

service SreAgentService {
  // buf:lint:ignore RPC_NO_CLIENT_STREAMING
  rpc Connect(stream ConnectRequest) returns (stream ConnectResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
    option (synq.v1.scope_authorization) = {
      scopes: [SCOPE_SRE_AGENT]
    };
  }

  // GetConfig returns the Scout configuration (system prompts + DWH connection
  // summary) for the caller's workspace. Authorized for the agent itself
  // (SCOPE_SRE_AGENT), for any caller with workspace integration-read access
  // (SCOPE_INTEGRATION_READ) so admins / owners can inspect the live prompts
  // via synqctl / fe-app without an agent token, and for MCP read tokens
  // (SCOPE_MCP_READ) — matches the sibling DWH ConnectionsService scope shape.
  rpc GetConfig(GetConfigRequest) returns (GetConfigResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
    option (synq.v1.scope_authorization) = {
      scopes: [
        SCOPE_SRE_AGENT,
        SCOPE_INTEGRATION_READ,
        SCOPE_MCP_READ
      ]
    };
  }

  // ListPromptSuggestions returns prompt-improvement suggestions recorded for the
  // caller's workspace. Default scope is pending suggestions only; set statuses to
  // include accepted / dismissed / superseded rows. Sorted newest first.
  rpc ListPromptSuggestions(ListPromptSuggestionsRequest) returns (ListPromptSuggestionsResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
    option (synq.v1.scope_authorization) = {
      scopes: [
        SCOPE_INTEGRATION_READ,
        SCOPE_MCP_READ
      ]
    };
  }

  // AcceptPromptSuggestion applies a pending suggestion to the matching SRE agent
  // prompt field. The applied value is `suggested_value` unless `edited_value` is set.
  // Returns FAILED_PRECONDITION when the live prompt has drifted from the suggestion's
  // `baseline_value` since it was produced — the client should re-fetch and re-render.
  rpc AcceptPromptSuggestion(AcceptPromptSuggestionRequest) returns (AcceptPromptSuggestionResponse) {
    option (synq.v1.scope_authorization) = {
      scopes: [SCOPE_INTEGRATION_EDIT]
    };
  }

  // DismissPromptSuggestion marks a pending suggestion as dismissed with an optional
  // free-text reason. The SRE agent configuration is left untouched.
  rpc DismissPromptSuggestion(DismissPromptSuggestionRequest) returns (DismissPromptSuggestionResponse) {
    option (synq.v1.scope_authorization) = {
      scopes: [SCOPE_INTEGRATION_EDIT]
    };
  }

  // RecordPromptSuggestion is the producer-side endpoint used by the offline
  // analyser to register a new suggestion for a workspace. The server snapshots
  // the current value of the targeted prompt field as `baseline_value`. Any
  // pending suggestion for the same `(workspace, field)` pair is marked as
  // superseded before the new row is inserted. Returns the recorded suggestion,
  // or an empty response when the baseline already matches `suggested_value`
  // (no-op).
  //
  // Authorized for the agent / offline analyser (SCOPE_SRE_AGENT) and for
  // admins / owners with workspace integration-edit access
  // (SCOPE_INTEGRATION_EDIT), so an admin running synqctl can publish a
  // suggestion against a customer workspace via x-synq-workspace-override
  // without minting an agent token.
  rpc RecordPromptSuggestion(RecordPromptSuggestionRequest) returns (RecordPromptSuggestionResponse) {
    option (synq.v1.scope_authorization) = {
      scopes: [
        SCOPE_SRE_AGENT,
        SCOPE_INTEGRATION_EDIT
      ]
    };
  }
}

message ConnectRequest {
  oneof message {
    option (buf.validate.oneof).required = true;
    Hello hello = 1;
    AgentTaskResponse task_response = 3;
  }
}

message ConnectResponse {
  repeated agent.sre.v1.AgentTask tasks = 1;
}

message Hello {
  string name = 1;
  string build_version = 2;
}

message AgentTaskResponse {
  string task_id = 1 [(buf.validate.field) = {
    required: true
    string: {uuid: true}
  }];
  // Human visible message
  string message = 2;
  // Error message indicating a problem
  optional string error = 3;

  // Structured result data for tasks that return data
  oneof result {
    synq.agent.sre.v1.EvaluateResponse evaluate_response = 10;
  }
}

message AgentTask {
  string task_id = 1 [(buf.validate.field) = {
    required: true
    string: {uuid: true}
  }];
  google.protobuf.Timestamp created_at = 2;
  // Deadline after which the task should not be processed.
  // If set, the agent should skip or abort tasks past this time.
  optional google.protobuf.Timestamp deadline_at = 3;
  oneof task {
    option (buf.validate.oneof).required = true;
    synq.agent.sre.v1.TriageTask triage = 10;
    synq.agent.sre.v1.SuggestTestsTask suggest_tests = 11;
    synq.agent.sre.v1.EvaluateTask evaluate = 12;
  }
}

message TriageTask {
  repeated string issue_ids = 1;
}

message SuggestTestsTask {
  repeated synq.entities.v1.Identifier entity_ids = 1;
}

// Task to evaluate an LLM request on the agent side (for self-hosted agents).
message EvaluateTask {
  // The evaluate request to be processed by the agent's local LLM.
  synq.agent.sre.v1.EvaluateRequest request = 1;
}

message GetConfigRequest {}

message DwhConnection {
  // This will be connection in the agent or integration_id when managed
  string connection_id = 1;
  // What is the instance of this, e.g. BigQuery project or Databricks workspace
  string instance = 2;
  // Type of the DWH connection
  string type = 3;
  // Databases in this instance, this would be BigQuery dataset or Databricks catalog
  repeated string databases = 4;
  // Extra parameters present on the connection
  map<string, string> parameters = 5;
  // Indicates that Coalesce Quality managed agent can access this connection
  bool agent_access_enabled = 6;
}

message GetConfigResponse {
  // Workspace to which agent is authenticated
  string workspace = 1;
  // Extra instructions used while triaging and concluding issues.
  string triage_system_prompt = 2;
  // Extra instructions used while suggesting tests.
  string tester_system_prompt = 3;
  // Extra instructions describing workspace to which agent is connected.
  string workspace_system_prompt = 4;
  // Description of all DWH connections/integrations configured in Coalesce Quality. Will indicate to the agent
  // that it can't access all the data sources if agent has no connections enabled.
  repeated DwhConnection synq_dwh_connections = 5;
  // Extra instructions describing how issues should be grouped
  string issue_grouping_system_prompt = 6;
  // Indicates that SRE shouldn't group any issues
  bool issue_grouping_disabled = 7;
}

// PromptField identifies which SRE agent system-prompt a suggestion targets.
// Mirrors the four `*_system_prompt` fields returned by `GetConfig`.
enum PromptField {
  PROMPT_FIELD_UNSPECIFIED = 0;
  PROMPT_FIELD_TRIAGE = 1;
  PROMPT_FIELD_TESTER = 2;
  PROMPT_FIELD_WORKSPACE = 3;
  PROMPT_FIELD_ISSUE_GROUPING = 4;
}

// PromptSuggestionStatus is the review lifecycle of a single prompt suggestion.
// `SUPERSEDED` indicates a newer pending suggestion for the same field replaced
// this one before it was reviewed.
enum PromptSuggestionStatus {
  PROMPT_SUGGESTION_STATUS_UNSPECIFIED = 0;
  PROMPT_SUGGESTION_STATUS_PENDING = 1;
  PROMPT_SUGGESTION_STATUS_ACCEPTED = 2;
  PROMPT_SUGGESTION_STATUS_DISMISSED = 3;
  PROMPT_SUGGESTION_STATUS_SUPERSEDED = 4;
}

message PromptSuggestion {
  // Server-assigned UUID.
  string id = 1;
  // Workspace the suggestion belongs to. Always populated, always matches the
  // caller's workspace for customer-facing reads.
  string workspace = 2;
  PromptField field = 3;
  PromptSuggestionStatus status = 4;
  // Value of the targeted prompt field as it was at the moment the suggestion
  // was produced. Used to detect drift on Accept.
  string baseline_value = 5;
  // Value proposed by the analyser. A full replacement for the targeted prompt;
  // diffed against `baseline_value` in the review UI (see the producer guidance
  // on `RecordPromptSuggestionRequest.suggested_value`).
  string suggested_value = 6;
  // Short markdown explanation produced by the analyser (<= 2048 bytes),
  // rendered as a "why" callout above the diff in the review UI.
  string rationale = 7;
  // Opaque JSON encoded by the producer (e.g. references to source entities
  // and incidents). Returned only to producer-scoped callers; customer reads
  // see an empty value.
  bytes evidence_json = 8;
  // Producer identifier + version, e.g. `"offline_audit_v1"`.
  string source = 9;
  google.protobuf.Timestamp produced_at = 10;
  // Identity of whoever reviewed the suggestion (derived from the JWT actor).
  // Empty while the suggestion is pending.
  string reviewed_by = 11;
  google.protobuf.Timestamp reviewed_at = 12;
  // Optional short reason on dismiss, or note on accept (<= 512 bytes). A
  // one-line annotation captured for the audit trail.
  string decision_note = 13;
  // Value actually written to the prompt field. Differs from `suggested_value`
  // when the user edited before accepting.
  string applied_value = 14;
}

message ListPromptSuggestionsRequest {
  // Empty = include all fields.
  repeated PromptField fields = 1;
  // Empty = pending only.
  repeated PromptSuggestionStatus statuses = 2;
}

message ListPromptSuggestionsResponse {
  repeated PromptSuggestion suggestions = 1;
}

message AcceptPromptSuggestionRequest {
  string id = 1 [(buf.validate.field) = {
    required: true
    string: {uuid: true}
  }];
  // If set, the user edited the suggestion before accepting. The server records
  // both `suggested_value` (unchanged) and `applied_value` (= `edited_value`).
  // Hard-capped at 16384 bytes to match the SRE agent prompt field limits.
  optional string edited_value = 2 [(buf.validate.field).string.max_bytes = 16384];
  // Optional short free-text note recorded with the decision. Capped at 512
  // bytes — it is a one-line annotation for the audit trail, not a place to
  // restate the prompt.
  optional string note = 3 [(buf.validate.field).string.max_bytes = 512];
}

message AcceptPromptSuggestionResponse {
  PromptSuggestion suggestion = 1;
}

message DismissPromptSuggestionRequest {
  string id = 1 [(buf.validate.field) = {
    required: true
    string: {uuid: true}
  }];
  // Optional short free-text reason recorded with the decision. Capped at 512
  // bytes — a one-line justification for the audit trail.
  optional string reason = 2 [(buf.validate.field).string.max_bytes = 512];
}

message DismissPromptSuggestionResponse {
  PromptSuggestion suggestion = 1;
}

message RecordPromptSuggestionRequest {
  // Targets the workspace from the JWT (back-office producers select the
  // workspace via the standard x-synq-workspace-override header).
  PromptField field = 2 [(buf.validate.field).required = true];
  // Full replacement value for the targeted prompt field, hard-capped at 16384
  // bytes to match the SRE agent prompt field limit.
  //
  // Producer guidance — propose the *smallest* change that achieves the goal.
  // Start from the current prompt value and append, delete, or rewrite only the
  // relevant section; do not regenerate the whole prompt from scratch. The
  // reviewer is shown a Current-vs-Suggested diff, so a surgical edit is far
  // easier to approve than a wholesale rewrite that rewords every line.
  //
  // Keep individual lines short and break content into paragraphs separated by
  // newlines instead of collapsing everything onto one long line. The review UI
  // diffs line by line, so well-broken text produces a readable, minimal diff;
  // a single monster line shows up as one giant replaced block.
  string suggested_value = 3 [(buf.validate.field) = {
    required: true
    string: {max_bytes: 16384}
  }];
  // Short markdown explanation of why the change is proposed, capped at 2048
  // bytes. Shown to the reviewer as a "why" callout above the diff, so keep it
  // to a few tight sentences or bullet points — it justifies the change, it does
  // not restate the prompt. As with `suggested_value`, prefer short lines /
  // paragraphs over one long line.
  string rationale = 4 [(buf.validate.field).string.max_bytes = 2048];
  // Opaque JSON: structured pointers the analyser used to produce the suggestion
  // (top entities, sample issues, etc.). Stored verbatim for traceability.
  bytes evidence_json = 5;
  // Producer identifier + version, e.g. `"offline_audit_v1"`. A short slug, not
  // free text — capped at 128 bytes.
  string source = 6 [(buf.validate.field) = {
    required: true
    string: {max_bytes: 128}
  }];
}

message RecordPromptSuggestionResponse {
  // Empty when the live baseline already matches `suggested_value` (no-op).
  PromptSuggestion suggestion = 1;
}
