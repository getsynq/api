syntax = "proto3";

package synq.users.v1;

import "buf/validate/validate.proto";

option go_package = "github.com/getsynq/api/users/v1";

message User {
  string id = 1;
  string first_name = 2;
  string last_name = 3;
  string email = 4;

  // Canonical identity strings for this user.
  // Includes "synq:<user_id>" and all linked aliases (email, slack, msteams).
  // Can be passed to ListIssues(interacted_by_identities) to filter issues this user interacted with.
  repeated string identities = 5;
}

message UserAlias {
  string user_id = 1 [(buf.validate.field).string.uuid = true];

  oneof type {
    SlackUser slack = 30;
    EmailUser email = 31;
    MsTeamsUser ms_teams = 32;
  }
}

message SlackUser {
  string user_id = 1 [(buf.validate.field) = {
    string: {min_len: 1}
    required: true
  }];
}

message MsTeamsUser {
  string member_id = 1 [(buf.validate.field) = {
    string: {min_len: 1}
    required: true
  }];
}

message EmailUser {
  string user_email = 1 [(buf.validate.field) = {
    string: {
      min_len: 1
      email: true
    }
    required: true
  }];
}
