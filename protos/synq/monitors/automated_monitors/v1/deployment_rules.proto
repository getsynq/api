syntax = "proto3";
package synq.monitors.automated_monitors.v1;

import "buf/validate/validate.proto";
import "synq/queries/v1/query_operand.proto";
import "synq/queries/v1/query_parts.proto";
import "synq/v1/source.proto";

option go_package = "github.com/getsynq/api/monitors/automated_monitors/v1";

message EntitySelectionQuery {
  option (buf.validate.message).cel = {
    id: "entity_selection_query.except_requires_two_parts"
    message: "QUERY_OPERAND_EXCEPT requires exactly 2 parts"
    expression: "this.operand != 3 || this.parts.size() == 2"
  };

  repeated QueryPart parts = 1;
  synq.queries.v1.QueryOperand operand = 2;

  message QueryPart {
    oneof part {
      synq.queries.v1.IdentifierList identifier_list = 1;
      synq.queries.v1.WithNameSearch with_name_search = 2;
      synq.queries.v1.WithType with_type = 3;
      synq.queries.v1.WithAnnotation with_annotation = 4;
      // synq.queries.v1.InDataPlatform in_data_platform = 5;
      synq.queries.v1.InFolder in_folder = 6;

      EntitySelectionQuery query = 100;
      synq.queries.v1.Unsupported unsupported = 101;
    }
  }
}

enum Severity {
  SEVERITY_UNSPECIFIED = 0;
  SEVERITY_WARNING = 1;
  SEVERITY_ERROR = 2;
  SEVERITY_INFO = 3;
}

enum MetricId {
  METRIC_ID_UNSPECIFIED = 0;
  METRIC_ID_ROW_COUNT = 1;
  METRIC_ID_DELAY = 2;
  METRIC_ID_VOLUME_CHANGE_DELAY = 3;
}

enum Sensitivity {
  SENSITIVITY_UNSPECIFIED = 0;
  SENSITIVITY_PRECISE = 1;
  SENSITIVITY_BALANCED = 2;
  SENSITIVITY_RELAXED = 3;
}

message MetricOption {
  Sensitivity sensitivity = 1 [(buf.validate.field).enum = {
    not_in: [0]
  }];
  MetricId metric_id = 2 [(buf.validate.field).enum = {
    not_in: [0]
  }];
}

message AutomatedMonitorSettings {
  Severity severity = 1;
  Sensitivity sensitivity = 2; // LEGACY - global sensitivity
  repeated MetricId metric_ids = 3; // LEGACY - which metrics to monitor
  repeated MetricOption metric_options = 4; // NEW - per-metric sensitivity
}

message MonitorSettingsChange {
  string monitored_asset_path = 1;
  AutomatedMonitorSettings original_settings = 2;
  AutomatedMonitorSettings new_settings = 3;
}

message CustomMonitorSettingsChange {
  string monitored_asset_path = 1;
  AutomatedMonitorSettings original_settings = 2;
  AutomatedMonitorSettings new_settings = 3;
  optional string resolved_freshness_field = 4;
}

message SkippedAsset {
  string asset_path = 1;
  string reason = 2;
}

message MonitorsDeploymentOverview {
  repeated string monitors_to_create_for = 1;
  repeated string monitors_to_delete_for = 2;
  repeated string active_monitors_for = 3;
  repeated MonitorSettingsChange monitor_settings_changes = 4;

  repeated string custom_monitors_to_create_for = 5;
  repeated string custom_monitors_to_delete_for = 6;
  repeated string active_custom_monitors_for = 7;
  repeated CustomMonitorSettingsChange custom_monitor_settings_changes = 8;

  repeated SkippedAsset skipped_assets = 9;
}

message QueryConfig {
  EntitySelectionQuery query = 1;
  Severity severity = 2 [(buf.validate.field).enum = {
    not_in: [0]
  }];
  Sensitivity sensitivity = 3 [(buf.validate.field).enum = {
    not_in: [0]
  }];
  repeated MetricId metric_ids = 4 [
    (buf.validate.field).repeated.min_items = 1,
    (buf.validate.field).repeated.unique = true,
    (buf.validate.field).repeated.items.enum = {
      not_in: [0]
    }
  ];
  bool keep_deleted_monitors = 5;
  repeated MetricOption metric_options = 6; // NEW - optional per-metric config
  // ResolverQL selection string — an advanced, more expressive alternative to
  // `query`. ResolverQL is a superset of the structured `query`: use it for
  // selections `query` cannot express (e.g. lineage walks, column predicates).
  // When set (non-empty) on write, `resolver_ql` is the source of truth and the
  // structured `query` is ignored. On read it is echoed back VERBATIM (exactly
  // as written, not normalized) for rules authored via ResolverQL, and is empty
  // for rules authored via the structured `query` — so writing a read response
  // back unchanged preserves the rule's authored form (a structured rule stays
  // structured rather than being silently rewritten to ResolverQL). To read the
  // ResolverQL form of a structured rule, use `rendered_resolver_ql`. `query` is
  // always populated regardless.
  string resolver_ql = 7;
  // Canonical ResolverQL rendering of this rule's selection, populated for every
  // query rule regardless of how it was authored. OUTPUT ONLY — it is ignored on
  // write; set `resolver_ql` to author a selection in ResolverQL. Use it to read
  // the ResolverQL form of a rule authored via the structured `query`; for
  // ResolverQL-authored rules it equals `resolver_ql`. Empty only for selections
  // that have no ResolverQL representation.
  string rendered_resolver_ql = 8;
}

message ExclusiveQueryConfig {
  EntitySelectionQuery query = 1;
  // ResolverQL selection string for the exclusion set. Same semantics as
  // QueryConfig.resolver_ql: when set on write it takes precedence over `query`;
  // on read it is echoed back VERBATIM for ResolverQL-authored rules and is empty
  // for structured-`query` rules (whose ResolverQL form is in
  // `rendered_resolver_ql`). `query` is always populated.
  string resolver_ql = 2;
  // Canonical ResolverQL rendering of the exclusion selection. Same semantics as
  // QueryConfig.rendered_resolver_ql: OUTPUT ONLY, populated for every rule,
  // ignored on write.
  string rendered_resolver_ql = 3;
}

message StaticConfig {
  string path = 1;
  Severity severity = 2 [(buf.validate.field).enum = {
    not_in: [0]
  }];
  Sensitivity sensitivity = 3 [(buf.validate.field).enum = {
    not_in: [0]
  }];
  repeated MetricId metric_ids = 4 [
    (buf.validate.field).repeated.min_items = 1,
    (buf.validate.field).repeated.unique = true,
    (buf.validate.field).repeated.items.enum = {
      not_in: [0]
    }
  ];
  repeated MetricOption metric_options = 5; // NEW
}

message ExclusiveStaticConfig {
  string path = 1;
}

message ProductConfig {
  string product_id = 1;
  Severity severity = 2 [(buf.validate.field).enum = {
    not_in: [0]
  }];
  Sensitivity sensitivity = 3 [(buf.validate.field).enum = {
    not_in: [0]
  }];
  repeated MetricId metric_ids = 4 [
    (buf.validate.field).repeated.min_items = 1,
    (buf.validate.field).repeated.unique = true,
    (buf.validate.field).repeated.items.enum = {
      not_in: [0]
    }
  ];
  ProductConfigUpstreamStrategy upstream = 5;
  ProductConfigSelfStrategy self = 6;
  bool keep_deleted_monitors = 7;
  repeated MetricOption metric_options = 8; // NEW
}

message ProductConfigUpstreamStrategy {
  oneof strategy {
    ProductConfigUpstreamStrategyAll all = 1;
    ProductConfigUpstreamStrategySources sources = 2;
  }
}

message ProductConfigUpstreamStrategyAll {}
message ProductConfigUpstreamStrategySources {}

message ProductConfigSelfStrategy {
  oneof strategy {
    ProductConfigSelfStrategyAll all = 1;
    ProductConfigSelfStrategySelection selection = 2;
  }
}

message ProductConfigSelfStrategyAll {}
message ProductConfigSelfStrategySelection {
  EntitySelectionQuery query = 1;
}

message MonitorsDeploymentRule {
  string id = 1 [(buf.validate.field).string.uuid = true];
  string title = 2 [(buf.validate.field) = {
    string: {
      min_len: 1
      max_len: 100
    }
  }];

  oneof config {
    QueryConfig query_config = 3;
    ExclusiveQueryConfig exclusive_query_config = 4;
    StaticConfig static_config = 5;
    ExclusiveStaticConfig exclusive_static_config = 6;
    ProductConfig product_config = 7;
  }

  synq.v1.Source source = 8;
  optional string config_id = 9;
}

message MonitorsDeploymentRuleView {
  string id = 1;
  string title = 2;
  int32 monitor_count = 3;

  oneof config {
    QueryConfig query_config = 4;
    ExclusiveQueryConfig exclusive_query_config = 5;
    StaticConfig static_config = 6;
    ExclusiveStaticConfig exclusive_static_config = 7;
    ProductConfig product_config = 8;
  }

  synq.v1.Source source = 9;
  optional string config_id = 10;
}

// DeploymentRuleType identifies which kind of selection a deployment rule uses.
// The value corresponds to the populated `config` oneof arm on
// MonitorsDeploymentRule / MonitorsDeploymentRuleView. Use it with
// ListDeploymentRulesRequest.rule_types to return only rules of selected kinds.
enum DeploymentRuleType {
  // No filter — when used in a request, rules of any type are returned.
  DEPLOYMENT_RULE_TYPE_UNSPECIFIED = 0;
  // Rule with `query_config`: selects entities by a ResolverQL query and deploys
  // monitors on the matches.
  DEPLOYMENT_RULE_TYPE_QUERY = 1;
  // Rule with `exclusive_query_config`: a ResolverQL query whose matches are
  // exclusively owned (monitors outside the match set are removed).
  DEPLOYMENT_RULE_TYPE_EXCLUSIVE_QUERY = 2;
  // Rule with `static_config`: targets a single fixed entity path.
  DEPLOYMENT_RULE_TYPE_STATIC_PATH = 3;
  // Rule with `exclusive_static_config`: a single fixed path, exclusively owned.
  DEPLOYMENT_RULE_TYPE_EXCLUSIVE_STATIC_PATH = 4;
  // Rule with `product_config`: deploys monitors across a data product's
  // entities per its upstream/self selection strategy.
  DEPLOYMENT_RULE_TYPE_PRODUCT = 5;
}
