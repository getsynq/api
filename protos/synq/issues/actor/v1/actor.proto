syntax = "proto3";

package synq.issues.actor.v1;

import "buf/validate/validate.proto";

option go_package = "github.com/getsynq/api/issues/actor/v1";

message Actor {
  string name = 1 [(buf.validate.field) = {
    string: {min_len: 1}
    required: true
  }];
  oneof user {
    SlackUser slack = 2;
    EmailUser email = 3;
    PagerdutyUser pagerduty = 4;
  }

  enum Via {
    VIA_UNSPECIFIED = 0;  // Unknown / not set
    VIA_API = 1;          // Public API
    VIA_MCP = 2;          // Official MCP server
    VIA_SLACK = 3;        // Slack bot integration
    VIA_PAGERDUTY = 4;    // PagerDuty webhook
  }
  Via via = 5;
}

message SlackUser {
  string user_id = 1 [(buf.validate.field) = {
    string: {min_len: 1}
    required: true
  }];
}

message EmailUser {
  string user_email = 1 [(buf.validate.field) = {
    string: {
      min_len: 1
      email: true
    }
    required: true
  }];
}

message PagerdutyUser {
  string user_id = 1 [(buf.validate.field) = {
    string: {min_len: 1}
    required: true
  }];
}
