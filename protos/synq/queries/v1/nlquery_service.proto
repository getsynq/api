syntax = "proto3";

package synq.queries.v1;

import "google/api/annotations.proto";
import "synq/queries/v1/query.proto";
import "synq/v1/scope_authorization.proto";

option go_package = "github.com/getsynq/api/queries/v1";

// NLQueryService generates structured Query protos from natural language descriptions using an LLM.
service NLQueryService {
  // GenerateQuery generates a Query from a natural language description.
  rpc GenerateQuery(GenerateQueryRequest) returns (GenerateQueryResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
    option (synq.v1.scope_authorization) = {
      scopes: [SCOPE_ENTITY_READ]
    };
    option (google.api.http) = {
      post: "/api/queries/v1/generate"
      body: "*"
    };
  }
}

message GenerateQueryRequest {
  string description = 1;
}

message GenerateQueryResponse {
  Query query = 1;
}
