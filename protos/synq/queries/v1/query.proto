syntax = "proto3";

package synq.queries.v1;

import "buf/validate/validate.proto";
import "synq/queries/v1/query_operand.proto";
import "synq/queries/v1/query_parts.proto";

option go_package = "github.com/getsynq/api/queries/v1";

// Query is a structured query that can be used to find entities in the system.
// It consists of multiple parts, each representing a different filter or sub-query.
// The parts are combined using the operand to form the final result:
//   - AND (default): returns only entities matching ALL parts (intersection).
//   - OR: returns entities matching ANY part (union).
//   - EXCEPT: requires exactly 2 parts — returns entities from part[0] that are NOT in part[1].
//   - UPSTREAM: returns entities that are upstream (dependencies) of the entities matched by the parts.
//   - DOWNSTREAM: returns entities that are downstream (dependents) of the entities matched by the parts.
//
// Queries can be nested by using a Query as a QueryPart, enabling complex compositions
// like "upstream of all Snowflake tables".
message Query {
  option (buf.validate.message).cel = {
    id: "query.except_requires_two_parts"
    message: "QUERY_OPERAND_EXCEPT requires exactly 2 parts"
    expression: "this.operand != 3 || this.parts.size() == 2"
  };

  repeated QueryPart parts = 1;
  QueryOperand operand = 2; // Defaults to AND if not specified.

  message QueryPart {
    oneof part {
      IdentifierList identifier_list = 1;
      WithNameSearch with_name_search = 2;
      WithType with_type = 3;
      WithAnnotation with_annotation = 4;
      InDataproduct in_dataproduct = 5;
      InDataPlatform in_data_platform = 6;
      WithDataPlatformType with_data_platform_type = 7;
      InFolder in_folder = 8;
      InDomain in_domain = 9;

      // Nested sub-query, enabling recursive composition of filters and operands.
      Query query = 100;
      // Read-only. Represents internal query types that cannot be expressed in the public API.
      // Do not construct these directly — they are returned when translating from internal queries.
      Unsupported unsupported = 101;
    }
  }
}
